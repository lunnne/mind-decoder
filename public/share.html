<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 도전장이 날아왔어!</title>

    <!-- OG: 카카오톡·인스타 DM 등 공유 미리보기용 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="🧠 도전장이 날아왔어!" />
    <meta property="og:description" content="초성 힌트를 해독할 수 있어? 지금 바로 도전해봐 👀" />
    <meta property="og:image" content="https://mind-decoder.vercel.app/canyoudecode.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🧠 도전장이 날아왔어!" />
    <meta name="twitter:description" content="초성 힌트를 해독할 수 있어? 지금 바로 도전해봐 👀" />
    <meta name="twitter:image" content="https://mind-decoder.vercel.app/canyoudecode.png" />

    <script>
      // 봇은 여기서 멈추고 OG 태그를 읽음.
      // 사람은 즉시 게임 페이지로 리다이렉트됨.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var d = params.get('d');
        if (id) window.location.replace('/game?id=' + id);
        else if (d) window.location.replace('/game?d=' + d);
        else window.location.replace('/');
      })();
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 40px; color: #888;">
      잠시 후 게임으로 이동합니다...
    </p>
  </body>
</html>
